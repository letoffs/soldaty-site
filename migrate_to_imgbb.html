<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Миграция галереи из Firebase в ImgBB</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        .container { max-width: 800px; margin: 0 auto; }
        input, button, .back-btn { padding: 10px; margin: 10px 0; width: 100%; }
        button, .back-btn { background: #bd8a3e; color: #1a1a2e; font-weight: bold; cursor: pointer; border: none; border-radius: 4px; }
        .back-btn { background: #3e5a3e; text-align: center; display: inline-block; text-decoration: none; }
        .back-btn:hover { background: #5a7a5a; }
        button:hover { background: #ffb347; }
        .log { background: #0f0f1a; padding: 15px; height: 400px; overflow-y: auto; font-size: 12px; border-radius: 4px; }
        .success { color: #0f0; }
        .error { color: #f00; }
        .info { color: #ffd966; }
        .button-group { display: flex; gap: 10px; }
        .button-group .back-btn, .button-group button { flex: 1; margin: 10px 0; }
    </style>
</head>
<body>
<div class="container">
    <h1>Миграция галереи из Firebase в ImgBB</h1>
    
    <div class="button-group">
        <a href="admin-gallery.html" class="back-btn">
            <i class="fas fa-arrow-left"></i> ← Назад в админ-панель
        </a>
    </div>
    
    <hr style="border-color: #3e5a3e; margin: 15px 0;">
    
    <p>1. Получи API ключ на <a href="https://api.imgbb.com" target="_blank" style="color: #ffd966;">https://api.imgbb.com</a></p>
    <input type="text" id="apiKey" placeholder="Введите API ключ ImgBB">
    <p>2. Вставь JSON, экспортированный из Firebase (весь проект)</p>
    <textarea id="jsonData" rows="10" placeholder='Вставь сюда весь экспортированный JSON'></textarea>
    <button id="startBtn">Начать миграцию ТОЛЬКО галереи</button>
    <div class="log" id="log"></div>
</div>

<script>
    const IMGBB_API_KEY = '3db547606d1c14d103b40590e02e51bb';
    
    function log(message, type = 'info') {
        const logDiv = document.getElementById('log');
        const p = document.createElement('div');
        p.className = type;
        p.textContent = message;
        logDiv.appendChild(p);
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    async function uploadToImgBB(base64) {
        let imageData = base64;
        if (base64.includes(',')) {
            imageData = base64.split(',')[1];
        }
        
        const formData = new FormData();
        formData.append('key', IMGBB_API_KEY);
        formData.append('image', imageData);
        
        const response = await fetch('https://api.imgbb.com/1/upload', {
            method: 'POST',
            body: formData
        });
        
        const result = await response.json();
        
        if (result.success) {
            return result.data.url;
        } else {
            throw new Error(result.error?.message || 'Ошибка загрузки');
        }
    }

    document.getElementById('startBtn').addEventListener('click', async () => {
        const apiKey = document.getElementById('apiKey').value.trim();
        if (!apiKey) {
            alert('Введите API ключ');
            return;
        }
        
        const jsonText = document.getElementById('jsonData').value.trim();
        if (!jsonText) {
            alert('Вставьте JSON');
            return;
        }
        
        let fullData;
        try {
            fullData = JSON.parse(jsonText);
            log(`✅ JSON загружен`);
        } catch (e) {
            log(`❌ Ошибка парсинга: ${e.message}`, 'error');
            return;
        }
        
        // Берем ТОЛЬКО узел gallery
        const gallery = fullData.gallery;
        if (!gallery) {
            log(`❌ В JSON нет узла "gallery"`, 'error');
            return;
        }
        
        const photos = Object.entries(gallery);
        log(`✅ Найдено фото в gallery: ${photos.length}`);
        
        if (photos.length === 0) {
            log(`❌ Нет фото для миграции`, 'error');
            return;
        }
        
        document.getElementById('startBtn').disabled = true;
        
        const newGallery = {};
        
        for (let i = 0; i < photos.length; i++) {
            const [id, photo] = photos[i];
            log(`[${i+1}/${photos.length}] Обработка: ${photo.title || id}...`);
            
            // Пропускаем, если уже есть ссылка (начинается с http)
            if (photo.image && (photo.image.startsWith('http://') || photo.image.startsWith('https://'))) {
                log(`  ⏭️ Уже ссылка, пропускаем`, 'info');
                newGallery[id] = photo;
                continue;
            }
            
            try {
                const imgUrl = await uploadToImgBB(photo.image);
                log(`  ✅ Загружено: ${imgUrl.substring(0, 60)}...`, 'success');
                newGallery[id] = {
                    ...photo,
                    image: imgUrl,
                    migrated_to_imgbb: true
                };
            } catch (error) {
                log(`  ❌ Ошибка: ${error.message}`, 'error');
                newGallery[id] = photo;
            }
            
            await new Promise(r => setTimeout(r, 500));
        }
        
        // Создаём новый JSON с той же структурой, но с обновлённой галереей
        const resultData = {
            ...fullData,
            gallery: newGallery
        };
        
        const output = JSON.stringify(resultData, null, 2);
        const blob = new Blob([output], {type: 'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'firebase_export_with_imgbb.json';
        a.click();
        URL.revokeObjectURL(url);
        
        log(`\n✅ МИГРАЦИЯ ЗАВЕРШЕНА! Файл firebase_export_with_imgbb.json скачан.`, 'success');
        log(`📌 Теперь импортируй этот файл в Firebase (он заменит весь проект).`);
        
        document.getElementById('startBtn').disabled = false;
    });
</script>
</body>
</html>
