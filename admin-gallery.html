<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Админ-панель — Фотоальбом | Солдаты</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="Resources/soldaty_icon.png">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #bd8a3e;
            flex-wrap: wrap;
            gap: 15px;
        }
        .admin-title {
            color: #ffd966;
            font-family: 'Magistral-BoldItalic', 'Magistral', 'Gotham Pro', 'Montserrat', sans-serif;
            font-weight: bold;
            font-style: italic;
            font-size: 1.8rem;
        }
        .admin-title i {
            margin-right: 12px;
            color: #bd8a3e;
        }
        .admin-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .admin-btn {
            background: #1e2a1e;
            border: 1px solid #3e5a3e;
            padding: 10px 20px;
            border-radius: 30px;
            color: #ddd;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .admin-btn:hover {
            background: #bd8a3e;
            color: #0f1a0f;
        }
        .admin-btn.danger {
            border-color: #f44336;
            color: #f44336;
        }
        .admin-btn.danger:hover {
            background: #f44336;
            color: white;
        }
        .admin-btn.active {
            background: #bd8a3e;
            color: #0f1a0f;
        }
        .add-photo-form {
            background: #0f1a0f;
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 35px;
            border: 1px solid #3e5a3e;
        }
        .form-title {
            color: #ffd966;
            font-size: 1.3rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .upload-methods {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 25px;
        }
        .upload-method {
            background: #1a2a1a;
            border-radius: 20px;
            padding: 20px;
            border: 1px dashed #bd8a3e;
        }
        .upload-method h3 {
            color: #ffd966;
            font-size: 1rem;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .file-input-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
        }
        .file-input-label {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #2c3e2c;
            padding: 12px 20px;
            border-radius: 40px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .file-input-label:hover {
            background: #bd8a3e;
            color: #0f1a0f;
        }
        .file-input {
            position: absolute;
            opacity: 0;
            width: 0;
            height: 0;
        }
        .url-input {
            width: 100%;
            padding: 12px 15px;
            background: #1e2a1e;
            border: 1px solid #3e5a3e;
            border-radius: 12px;
            color: #eee;
            font-size: 0.9rem;
            margin-bottom: 10px;
        }
        .url-input:focus {
            outline: none;
            border-color: #bd8a3e;
        }
        .image-preview {
            margin-top: 15px;
            padding: 15px;
            background: #1e2a1e;
            border-radius: 12px;
            text-align: center;
            display: none;
        }
        .image-preview img {
            max-width: 200px;
            max-height: 200px;
            border-radius: 12px;
            border: 2px solid #bd8a3e;
        }
        .batch-preview {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
            padding: 5px;
        }
        .batch-preview-item {
            position: relative;
            background: #0f1a0f;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #3e5a3e;
        }
        .batch-preview-item img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        .batch-preview-item .remove-preview {
            position: absolute;
            top: 5px;
            right: 5px;
            background: #f44336;
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 10;
        }
        .batch-preview-item .remove-preview:hover {
            transform: scale(1.1);
        }
        .batch-preview-item .batch-title-input {
            width: 100%;
            padding: 4px 6px;
            font-size: 9px;
            background: #1e2a1e;
            border: none;
            border-top: 1px solid #3e5a3e;
            color: #ddd;
            text-align: center;
        }
        .batch-preview-item .batch-title-input:focus {
            outline: none;
            background: #2c3e2c;
        }
        .upload-progress {
            margin-top: 15px;
            padding: 10px;
            background: #1e2a1e;
            border-radius: 12px;
        }
        .progress-bar {
            height: 20px;
            background: #2c3e2c;
            border-radius: 10px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: #bd8a3e;
            width: 0%;
            transition: width 0.3s;
        }
        .progress-text {
            display: block;
            text-align: center;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #ffd966;
        }
        .batch-upload-btn {
            margin-top: 15px;
            width: 100%;
            background: #bd8a3e;
            border: none;
            padding: 10px;
            border-radius: 40px;
            color: #0f1a0f;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .batch-upload-btn:hover:not(:disabled) {
            background: #ffb347;
        }
        .batch-upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .batch-info-badge {
            margin-top: 12px;
            padding: 8px;
            background: #2c3e2c;
            border-radius: 8px;
            font-size: 0.7rem;
            text-align: center;
            color: #8aa07a;
        }
        .batch-info-badge i {
            color: #bd8a3e;
            margin-right: 5px;
        }
        .optional-fields {
            margin-top: 20px;
            border-top: 1px solid #3e5a3e;
            padding-top: 20px;
        }
        .toggle-optional {
            background: none;
            border: none;
            color: #8aa07a;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 15px;
        }
        .toggle-optional:hover {
            color: #ffd966;
        }
        .optional-content {
            display: none;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }
        .optional-content.show {
            display: grid;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #aaa;
            font-size: 0.85rem;
        }
        .form-group label i {
            margin-right: 6px;
            color: #bd8a3e;
        }
        .form-input, .form-textarea, .form-select {
            width: 100%;
            padding: 10px 12px;
            background: #1e2a1e;
            border: 1px solid #3e5a3e;
            border-radius: 10px;
            color: #eee;
            font-size: 0.85rem;
        }
        .form-textarea {
            resize: vertical;
            min-height: 60px;
        }
        .submit-btn {
            background: #bd8a3e;
            border: none;
            padding: 12px 28px;
            border-radius: 40px;
            color: #0f1a0f;
            font-weight: bold;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }
        .submit-btn:hover {
            background: #ffb347;
            transform: scale(1.02);
        }
        
        /* Групповое выделение */
        .batch-actions-bar {
            background: #1e2a1e;
            border-radius: 16px;
            padding: 15px 20px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
            border: 1px solid #bd8a3e;
        }
        .batch-actions-bar.show {
            display: flex;
        }
        .batch-selected-count {
            color: #ffd966;
            font-weight: bold;
        }
        .batch-actions-buttons {
            display: flex;
            gap: 12px;
        }
        .batch-action-btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
        }
        .batch-action-btn.edit {
            background: #ffc107;
            color: #1a2a1a;
        }
        .batch-action-btn.delete {
            background: #f44336;
            color: white;
        }
        .batch-action-btn.cancel {
            background: #3e5a3e;
            color: #ddd;
        }
        .batch-select-all {
            margin-left: 10px;
            padding: 6px 12px;
            background: #2c3e2c;
            border: none;
            border-radius: 20px;
            color: #aaa;
            cursor: pointer;
            font-size: 0.75rem;
        }
        .batch-select-all:hover {
            background: #bd8a3e;
            color: #0f1a0f;
        }
        
        .photos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }
        .photos-grid.select-mode .admin-photo-card {
            cursor: pointer;
        }
        .photos-grid.select-mode .admin-photo-card.selected {
            border: 3px solid #ffc107;
            transform: scale(0.98);
        }
        .checkbox-indicator {
            position: absolute;
            top: 10px;
            left: 10px;
            width: 28px;
            height: 28px;
            background: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 14px;
            z-index: 5;
        }
        .admin-photo-card.selected .checkbox-indicator {
            background: #ffc107;
            color: #1a2a1a;
        }
        .admin-photo-card {
            background: #0f1a0f;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #3e5a3e;
            position: relative;
            transition: all 0.2s;
            cursor: default;
        }
        .admin-photo-card:hover {
            border-color: #bd8a3e;
            transform: translateY(-3px);
        }
        .admin-photo-card img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
        .admin-photo-actions {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 10;
        }
        .admin-photo-card:hover .admin-photo-actions {
            opacity: 1;
        }
        .admin-photo-actions button {
            background: rgba(0,0,0,0.7);
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
        }
        .admin-photo-actions .edit-btn:hover {
            background: #ffc107;
            color: #0f1a0f;
        }
        .admin-photo-actions .delete-btn:hover {
            background: #f44336;
        }
        .admin-photo-info {
            padding: 10px;
            font-size: 0.7rem;
            color: #aaa;
            text-align: center;
        }
        .loading, .empty-state {
            text-align: center;
            padding: 40px;
            color: #8aa07a;
        }
        
        /* Модальное окно массового редактирования */
        .batch-edit-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
        }
        .batch-edit-modal .modal-content {
            background: #0f1a0f;
            border-radius: 24px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            border: 1px solid #bd8a3e;
        }
        
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #0f1a0f;
            color: #ffd966;
            padding: 12px 24px;
            border-radius: 50px;
            border: 1px solid #bd8a3e;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }
        .toast-message.show {
            opacity: 1;
            visibility: visible;
        }
        
        @media (max-width: 900px) {
            .upload-methods {
                grid-template-columns: 1fr;
                gap: 20px;
            }
        }
        @media (max-width: 700px) {
            .photos-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
    </style>
</head>
<body>
<div class="admin-container" id="adminContainer">
    <div class="loading"><i class="fas fa-spinner fa-pulse"></i> Проверка доступа...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="js/firebase-auth.js"></script>
<script src="js/admin-gallery.js"></script>
</body>
</html>
